name: Ghost Engine V31 - Build Pro APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout Project
        uses: actions/checkout@v4

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📥 Install Dependencies
        run: npm install

      - name: 🛠️ Generate Android Folder
        run: npx expo prebuild --platform android --no-install

      - name: 📦 Bundle JavaScript (Offline Mode)
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res

      - name: ⚙️ Build Standalone Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: 🔍 Find APK Path (For Debugging)
        run: find android/app/build/outputs/apk/ -name "*.apk"

      - name: 📤 Upload Ghost V31 Pro APK
        uses: actions/upload-artifact@v4
        with:
          name: Ghost-Engine-V31-Pro
          # Maine yahan wildcard (*) laga diya hai taaki koi bhi release APK mil jaye
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7
          
