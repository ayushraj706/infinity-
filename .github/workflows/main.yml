name: Ghost Engine V31 - Artifact Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout Project
        uses: actions/checkout@v4

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📥 Install Dependencies
        run: npm install

      - name: 🛠️ Prepare Build Files
        run: |
          echo "Ghost Engine V31: Preparing artifacts..."
          mkdir -p build-output
          cp App.js build-output/ || true
          cp app.json build-output/ || true
          cp package.json build-output/ || true
          cp -r scripts build-output/ || true
          cp -r assets build-output/ || true

      - name: 📤 Upload Artifact (The Download Button)
        uses: actions/upload-artifact@v4
        with:
          name: Ghost-Engine-V31-Build
          path: build-output/
          retention-days: 7
          
