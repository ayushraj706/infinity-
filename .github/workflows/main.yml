name: Ghost Engine V31 - Offline APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout Project
        uses: actions/checkout@v4

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📥 Install Dependencies
        run: npm install

      - name: 🛠️ Generate Android Folder
        run: npx expo prebuild --platform android --no-install

      - name: 📦 Bundle JavaScript (The Offline Fix)
        # Ye command JS code ko APK ke andar pack kar degi
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res

      - name: ⚙️ Build Standalone APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 Upload Ghost V31 APK
        uses: actions/upload-artifact@v4
        with:
          name: Ghost-Engine-V31-Offline-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          
